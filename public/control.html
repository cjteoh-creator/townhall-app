<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c14;
      --surface: #161622;
      --surface2: #1e1e2e;
      --border: #2a2a3e;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --accent3: #43e8c0;
      --text: #f0f0f8;
      --muted: #777790;
      --danger: #ff4d6d;
      --success: #4ade80;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 40px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 32px;
    }

    .status-badge.idle { background: var(--surface2); color: var(--muted); }
    .status-badge.live-poll { background: rgba(108,99,255,0.2); color: var(--accent); }
    .status-badge.live-wc { background: rgba(255,101,132,0.2); color: var(--accent2); }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      margin-top: 14px;
    }

    label:first-of-type { margin-top: 0; }

    input[type="text"], textarea {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 11px 14px;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.15s;
      resize: none;
    }

    input[type="text"]:focus, textarea:focus { border-color: var(--accent); }

    .options-list { display: flex; flex-direction: column; gap: 8px; }

    .option-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .option-row input { flex: 1; }

    .remove-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.15s;
    }

    .remove-btn:hover { color: var(--danger); }

    .add-option-btn {
      background: none;
      border: 1.5px dashed var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 9px;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      transition: all 0.15s;
    }

    .add-option-btn:hover { border-color: var(--accent); color: var(--accent); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 13px 20px;
      border-radius: 11px;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
      width: 100%;
      margin-top: 18px;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }

    .btn-poll { background: var(--accent); color: #fff; }
    .btn-wc { background: var(--accent2); color: #fff; }
    .btn-stop { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); }
    .btn-reset { background: none; color: var(--danger); border: 1.5px solid var(--danger); }

    .action-row {
      display: flex;
      gap: 12px;
    }

    .action-row .btn { flex: 1; margin-top: 0; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    .links-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .links-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .link-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .link-row:last-child { border-bottom: none; }

    .link-name { font-size: 14px; font-weight: 600; }
    .link-url { font-size: 13px; color: var(--muted); }

    .copy-btn {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    .live-preview {
      background: var(--surface2);
      border-radius: 10px;
      padding: 16px;
      font-size: 14px;
      color: var(--muted);
      text-align: center;
    }

    #live-summary { }
  </style>
</head>
<body>

  <h1>🎛️ Control Panel</h1>
  <div class="subtitle">Townhall Live Session — Presenter Only</div>

  <div id="status-badge" class="status-badge idle">
    <div class="dot" style="background:var(--muted)"></div>
    <span id="status-text">Session Idle</span>
  </div>

  <div class="links-card">
    <div class="links-title">🔗 Session Links</div>
    <div class="link-row">
      <div>
        <div class="link-name">📱 Participant Link</div>
        <div class="link-url" id="participant-url"></div>
      </div>
      <button class="copy-btn" onclick="copyLink('participant')">Copy</button>
    </div>
    <div class="link-row">
      <div>
        <div class="link-name">🖥️ Display (Big Screen)</div>
        <div class="link-url" id="display-url"></div>
      </div>
      <button class="copy-btn" onclick="copyLink('display')">Copy</button>
    </div>
  </div>

  <div class="grid">
    <!-- POLL CARD -->
    <div class="card">
      <div class="card-title">📊 Live Poll</div>

      <label>Question</label>
      <input type="text" id="poll-question" placeholder="e.g. How are you feeling today?" />

      <label>Answer Options</label>
      <div class="options-list" id="options-list">
        <div class="option-row">
          <input type="text" placeholder="Option A" />
          <button class="remove-btn" onclick="removeOption(this)">×</button>
        </div>
        <div class="option-row">
          <input type="text" placeholder="Option B" />
          <button class="remove-btn" onclick="removeOption(this)">×</button>
        </div>
      </div>
      <button class="add-option-btn" onclick="addOption()">+ Add Option</button>

      <button class="btn btn-poll" onclick="startPoll()">▶ Launch Poll</button>
    </div>

    <!-- WORD CLOUD CARD -->
    <div class="card">
      <div class="card-title">☁️ Word Cloud</div>

      <label>Question / Prompt</label>
      <input type="text" id="wc-question" placeholder="e.g. In one word, describe our team culture" />

      <div style="margin-top: 60px"></div>

      <button class="btn btn-wc" onclick="startWordCloud()">▶ Launch Word Cloud</button>
    </div>
  </div>

  <!-- STOP / RESET -->
  <div class="action-row">
    <button class="btn btn-stop" onclick="stopSession()">⏹ Stop Activity</button>
    <button class="btn btn-reset" onclick="resetSession()">↺ Full Reset</button>
  </div>

  <hr class="divider" />

  <div class="live-preview" id="live-summary">No active activity.</div>

  <script>
    const base = location.origin;
    document.getElementById('participant-url').textContent = base + '/';
    document.getElementById('display-url').textContent = base + '/display.html';

    function copyLink(type) {
      const url = type === 'participant' ? base + '/' : base + '/display.html';
      navigator.clipboard.writeText(url).then(() => alert('Copied: ' + url));
    }

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}`);

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state') updateStatus(msg.state);
    };

    function updateStatus(state) {
      const badge = document.getElementById('status-badge');
      const statusText = document.getElementById('status-text');
      const summary = document.getElementById('live-summary');

      badge.className = 'status-badge';

      if (state.mode === 'idle') {
        badge.classList.add('idle');
        badge.querySelector('.dot').style.background = 'var(--muted)';
        statusText.textContent = 'Session Idle';
        summary.textContent = 'No active activity.';
      } else if (state.mode === 'poll') {
        badge.classList.add('live-poll');
        badge.querySelector('.dot').style.background = 'var(--accent)';
        statusText.textContent = 'Poll Live';
        const totalVotes = Object.values(state.poll.votes).reduce((a, b) => a + b, 0);
        let lines = [`📊 ${state.poll.question}`, `Total votes: ${totalVotes}`, ''];
        state.poll.options.forEach((opt, i) => {
          const v = state.poll.votes[i] || 0;
          const pct = totalVotes > 0 ? Math.round(v / totalVotes * 100) : 0;
          lines.push(`${opt}: ${v} votes (${pct}%)`);
        });
        summary.innerHTML = lines.map(l => `<div>${l}</div>`).join('');
      } else if (state.mode === 'wordcloud') {
        badge.classList.add('live-wc');
        badge.querySelector('.dot').style.background = 'var(--accent2)';
        statusText.textContent = 'Word Cloud Live';
        const total = state.wordcloud.words.reduce((a, w) => a + w.count, 0);
        const top = [...state.wordcloud.words].sort((a,b) => b.count - a.count).slice(0, 8);
        summary.innerHTML = `<div>☁️ ${state.wordcloud.question}</div><div style="margin-top:8px;color:var(--text)">${top.map(w => `${w.text} (${w.count})`).join(' · ')}</div><div style="margin-top:8px">Total: ${total} responses</div>`;
      }
    }

    function send(data) {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'presenter', ...data }));
      }
    }

    function addOption() {
      const list = document.getElementById('options-list');
      const count = list.children.length;
      const letters = ['A','B','C','D','E','F'];
      const row = document.createElement('div');
      row.className = 'option-row';
      row.innerHTML = `<input type="text" placeholder="Option ${letters[count] || count+1}" /><button class="remove-btn" onclick="removeOption(this)">×</button>`;
      list.appendChild(row);
    }

    function removeOption(btn) {
      const list = document.getElementById('options-list');
      if (list.children.length > 2) btn.parentElement.remove();
    }

    function startPoll() {
      const question = document.getElementById('poll-question').value.trim();
      if (!question) { alert('Please enter a poll question.'); return; }
      const opts = [...document.querySelectorAll('#options-list input')].map(i => i.value.trim()).filter(Boolean);
      if (opts.length < 2) { alert('Please enter at least 2 options.'); return; }
      send({ action: 'start_poll', question, options: opts });
    }

    function startWordCloud() {
      const question = document.getElementById('wc-question').value.trim();
      if (!question) { alert('Please enter a word cloud question.'); return; }
      send({ action: 'start_wordcloud', question });
    }

    function stopSession() {
      if (confirm('Stop the current activity?')) send({ action: 'stop' });
    }

    function resetSession() {
      if (confirm('Reset everything? This clears all votes and words.')) send({ action: 'reset' });
    }
  </script>
</body>
</html>
